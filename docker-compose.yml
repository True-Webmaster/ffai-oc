services:
  keymux:
    build: .
    container_name: keymux
    restart: unless-stopped
    ports:
      - "${PORT:-8002}:${PORT:-8002}"
    env_file:
      - .env
    volumes:
      - keymux-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PORT:-8002}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  keymux-data:
